<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>靜舍的月光・鋼琴版（第一頁）｜Trail 和弦譜</title>
    <style>
      :root {
        --page: #202223;
        --paper: #f7f3ea;
        --ink: #2c2d2e;
        --muted: #68635c;
        --chord: #1176b8;
        --rule: #d7d0c4;
        --section: #c9515b;
        font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--page); color: var(--ink); }
      .page { display: flex; justify-content: center; min-height: 100vh; padding: 28px 16px 72px; }
      .chart {
        width: min(100%, 840px);
        min-height: 1120px;
        background:
          repeating-linear-gradient(0deg, rgba(0,0,0,.018) 0 1px, transparent 1px 4px),
          repeating-linear-gradient(90deg, rgba(0,0,0,.018) 0 1px, transparent 1px 5px),
          var(--paper);
        box-shadow: 0 20px 70px rgba(0,0,0,.38);
        padding: 34px 42px 48px;
      }
      .chart-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        border-bottom: 2px solid var(--rule);
        padding-bottom: 18px;
        margin-bottom: 24px;
      }
      h1, h2, p, dl, figure { margin: 0; }
      h1 { color: var(--ink); font-size: 40px; line-height: 1; letter-spacing: 0; }
      .chart-header p { margin-top: 10px; color: var(--muted); font-size: 16px; font-weight: 650; }
      .song-key { display: grid; grid-template-columns: repeat(3, auto); gap: 12px 18px; color: var(--muted); font-size: 14px; text-align: right; white-space: nowrap; }
      .song-key div { display: grid; gap: 4px; }
      .song-key dt { font-weight: 700; }
      .song-key dd { color: var(--ink); font-size: 17px; font-weight: 900; }
      .section { position: relative; display: grid; gap: 24px; margin-top: 34px; padding-left: 44px; }
      .section h2 { position: absolute; left: 0; top: 16px; color: var(--section); font-size: 18px; font-weight: 900; }
      .progression { display: flex; flex-wrap: wrap; gap: 20px; color: var(--chord); font-size: 24px; font-weight: 900; line-height: 1.2; }
      .vocal-pair { display: grid; gap: 4px; }
      .lyric-line { position: relative; min-height: 54px; padding-top: 24px; color: var(--ink); font-size: 21px; font-weight: 760; line-height: 1.45; letter-spacing: 0; word-spacing: .16em; }
      .phrase-layout { padding-top: 0; }
      .lyric-phrase { display: inline-block; position: relative; margin-right: .9em; padding-top: 24px; }
      .jp-line { word-spacing: .05em; }
      .jp-line .hit { min-width: 1.08em; }
      .jp-line .hit[data-chord="C#dim7"],
      .jp-line .hit[data-chord="F#m7-5"],
      .jp-line .hit[data-chord="C#m7-5"] { min-width: 4.8em; }
      .jp-line .hit::before { font-size: .72em; top: -1.36em; }
      .romaji-line { color: var(--muted); font-size: 14px; font-weight: 760; line-height: 1.35; letter-spacing: 0; }
      .hit { position: relative; display: inline-block; min-width: .95em; word-spacing: 0; }
      .hit::before { content: attr(data-chord); position: absolute; left: 0; top: -1.48em; color: var(--chord); font-size: .92em; font-weight: 900; line-height: 1; white-space: nowrap; }
      .hit.empty { width: 2.4em; }
      .matrix-figure { margin-top: 44px; border-top: 2px solid var(--rule); padding-top: 22px; }
      .matrix-figure img { display: block; width: 100%; height: auto; }
      .toolbar { position: fixed; right: 18px; bottom: 18px; }
      button { border: 0; border-radius: 999px; background: #171819; color: white; cursor: pointer; font: inherit; font-weight: 850; padding: 11px 18px; box-shadow: 0 10px 30px rgba(0,0,0,.32); }
      @media (max-width: 720px) {
        .page { padding: 0 0 72px; }
        .chart { padding: 24px 22px 40px; }
        .chart-header { display: grid; }
        .song-key { justify-content: start; text-align: left; }
        .section { padding-left: 0; }
        .section h2 { position: static; }
        .lyric-line { font-size: 18px; }
        .lyric-phrase { margin-right: .55em; padding-top: 22px; }
        .jp-line { word-spacing: 0; }
        .jp-line .hit { min-width: 1em; }
        .jp-line .hit[data-chord="C#dim7"],
        .jp-line .hit[data-chord="F#m7-5"],
        .jp-line .hit[data-chord="C#m7-5"] { min-width: 4.35em; }
        .jp-line .hit::before { font-size: .66em; }
        .romaji-line { font-size: 12px; }
      }
      @page { size: A4 portrait; margin: 12mm; }
      @media print {
        body, .page { background: white; }
        .page { display: block; min-height: 0; padding: 0; }
        .chart { width: auto; min-height: 0; box-shadow: none; padding: 0; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
        .toolbar { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="靜舍的月光・鋼琴版（第一頁） Trail 和弦譜">
      <article class="chart">
        <header class="chart-header">
          <div>
            <h1>靜舍的月光・鋼琴版（第一頁）</h1>
            <p>許美靜</p>
          </div>
          <dl class="song-key" aria-label="調性資訊"><div><dt>Key</dt><dd>C</dd></div><div><dt>Capo</dt><dd>0</dd></div><div><dt>Beat</dt><dd>4/4</dd></div></dl>
        </header>
        <section class="section"><h2>前奏 1–10</h2><p class="progression"><span>| 1 C</span><span>| 2 C</span><span>| 3 C</span><span>| 4 Em/B  Am</span><span>| 5 C/G  F</span><span>| 6 G</span><span>| 7 C</span><span>| 8 Em/A  Am</span><span>| 9 C/G  F</span><span>| 10 G |</span></p></section><section class="section"><h2>A 11–18</h2><p class="lyric-line"><span class="lyric-phrase"><span class="hit" data-chord="Am">每</span>顆心上某<span class="hit" data-chord="Em">一</span>個地方</span></p><p class="lyric-line"><span class="lyric-phrase"><span class="hit" data-chord="F">總</span>有個<span class="hit" data-chord="E">記</span>憶揮不散</span></p><p class="lyric-line"><span class="lyric-phrase"><span class="hit" data-chord="Am">每</span>個深夜<span class="hit" data-chord="Em">某</span>一個地方</span></p><p class="lyric-line"><span class="lyric-phrase"><span class="hit" data-chord="F">總</span>有著<span class="hit" data-chord="G">最</span>深的思量</span></p></section><section class="section"><h2>A 19–23</h2><p class="lyric-line"><span class="lyric-phrase"><span class="hit" data-chord="C">世</span>間萬千的<span class="hit" data-chord="Am">變</span>幻</span><span class="lyric-phrase"><span class="hit" data-chord="C/G">愛</span>把<span class="hit" data-chord="F">有</span>情的人<span class="hit" data-chord="G">分</span>兩<span class="hit" data-chord="F">端</span></span></p></section>
        <figure class="matrix-figure">
          <img src="trail-matrix.svg" alt="吉他、人聲與交集 Trail 向量矩陣">
        </figure>
      </article>
      <nav class="toolbar" aria-label="工具列"><button type="button" onclick="window.print()">列印</button></nav>
    </main>
  </body>
</html>
